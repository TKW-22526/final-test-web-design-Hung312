<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGear - Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        .section-title { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 30px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">TechGear</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#component">Phụ kiện máy tính</a></li>
                    <li class="nav-item"><a class="nav-link" href="#gear">Gaming Gear</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="gioi-thieu.html">Giới thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="lien-he.html" target="_blank">Liên hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- Section Phụ kiện máy tính -->
        <section id="component" class="mb-5 pt-4">
            <h2 class="section-title fw-bold text-uppercase">Phụ kiện máy tính (PC Components)</h2>
            <div class="control-panel" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: nowrap; align-items: center;">
            <input type="text" id="search-components" oninput="renderComponents()" placeholder="Nhập tên sản phẩm...">
                <select id="category-components" onchange="renderComponents()">
                    <option value="all">-- Tất cả danh mục --</option>
                    <option value="cpu">CPU (Vi xử lý)</option>
                    <option value="gpu">GPU (Card đồ họa)</option>
                    <option value="ram">RAM (Bộ nhớ)</option>
                    <option value="ssd">SSD (Ổ cứng)</option>
                    <option value="motherboard">Motherboard</option>
                    <option value="psu">PSU (Nguồn điện)</option>
                    <option value="cpu-cooler">CPU Cooler</option>
                    <option value="case">Vỏ máy tính</option>
                </select>

                <select id="brand-components" onchange="renderComponents()">
                    <option value="all">-- Tất cả thương hiệu --</option>
                    <option value="Intel">Intel</option>
                    <option value="AMD">AMD</option>
                    <option value="Gigabyte">Gigabyte(Geforge)</option>
                    <option value="Sapphire">Sapphire(Radeon)</option>
                    <option value="ASUS">ASUS</option>
                    <option value="Corsair">Corsair</option>
                    <option value="G.Skill">G.Skill</option>
                    <option value="MSI">MSI</option>
                    <option value="Western Digital">WD</option>
                    <option value="Lian Li">Lian Li</option>
                    <option value="Noctua">Noctua</option>
                </select>

                <select id="price-components" onchange="renderComponents()">
                    <option value="default">-- Sắp xếp theo giá --</option>
                    <option value="asc">Giá: Tăng dần</option>
                    <option value="desc">Giá: Giảm dần</option>
                </select>

                <button onclick="resetComponentsFilters()" style="background-color: #1337db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    Xóa hiển thị
                </button>
            </div>
            <div class="row g-4" id="components-list"></div>
        </section>

        <!-- Section Gaming Gear -->
        <section id="gear" class="mb-5 pt-4">
            <h2 class="section-title fw-bold text-uppercase">Gaming Gear</h2>
            <div class="control-panel" style="margin-bottom: 20px; display: flex; gap: 15px; wrap: nowrap; align-items: center;">
            <input type="text" id="search-gear" oninput="renderGears()" placeholder="Nhập tên sản phẩm để tìm nhanh...">
                <select id="category-gear" onchange="renderGears()">
                    <option value="all">-- Tất cả danh mục --</option>
                    <option value="gaming-mice">Gaming Mouse</option>
                    <option value="mechanical-keyboards">Gaming Keyboards(Bàn phím)</option>
                    <option value="gaming-headsets">Gaming Headsets(Tai nghe)</option>
                    <option value="monitors">Monitors(Màn hình)</option>
                </select>

                <select id="brand-gear" onchange="renderGears()">
                    <option value="all">-- Tất cả thương hiệu --</option>
                    <option value="Logitech">Logitech</option>
                    <option value="Razer">Razer</option>
                    <option value="SteelSeries">SteelSeries</option>
                    <option value="Wooting">Wooting</option>
                    <option value="ASUS">ASUS</option>
                    <option value="HyperX">HyperX</option>
                    <option value="BenQ">BenQ</option>
                </select>

                <select id="price-gear" onchange="renderGears()">
                    <option value="default">-- Sắp xếp theo giá --</option>
                    <option value="asc">Giá: Tăng dần</option>
                    <option value="desc">Giá: Giảm dần</option>
                </select>

                <button onclick="resetGearsFilters()" style="background-color: #1337db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    Xóa hiển thị
                </button>
            </div>
            <div class="row g-4" id="gear-list"></div>
        </section>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0 fw-bold">&copy; Nguyễn Trường Hưng</p>
        <p class="mb-0">110124070 | DA24TTA | Công nghệ Thông tin</p>
        <p class="mb-0">nguyenhungeqqw@gmail.com</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
