<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - TechGear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">TechGear</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="san-pham.html" target="_blank">Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="gioi-thieu.html">Giới thiệu</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Gửi yêu cầu hỗ trợ</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="contact-form">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Họ và tên</label>
                                    <input type="text" class="form-control" required placeholder="Nhập họ tên...">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Số điện thoại</label>
                                    <input type="tel" class="form-control" required placeholder="Nhập số điện thoại...">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email liên hệ</label>
                                <input type="email" class="form-control" required placeholder="example@gmail.com">
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Bạn cần hỗ trợ về vấn đề gì?</label>
                                    <select class="form-select" required>
                                        <option value="">-- Chọn phòng ban --</option>
                                        <option value="sales">Tư vấn mua linh kiện/Build PC</option>
                                        <option value="warranty">Bảo hành & Đổi trả</option>
                                        <option value="tech">Hỗ trợ kỹ thuật phần mềm</option>
                                        <option value="other">Góp ý khiếu nại</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Mức độ ưu tiên</label>
                                    <div class="mt-2">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="priority" value="normal" checked>
                                            <label class="form-check-label">Bình thường</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="priority" value="urgent">
                                            <label class="form-check-label text-danger">Khẩn cấp</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả chi tiết yêu cầu</label>
                                <textarea class="form-control" rows="5" required placeholder="Vui lòng cung cấp chi tiết lỗi thiết bị hoặc cấu hình bạn muốn tư vấn..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold">Gửi Yêu Cầu</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0 fw-bold">&copy; Nguyễn Trường Hưng</p>
        <p class="mb-0">110124070 | DA24TTA | Công nghệ Thông tin</p>
        <p class="mb-0">nguyenhungeqqw@gmail.com</p>
    </footer>

    <script src="../js/script.js"></script>
    <script src="../js/data.js"></script>
</body>
</html>
